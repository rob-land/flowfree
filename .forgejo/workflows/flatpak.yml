name: Flatpak

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  flatpak:
    runs-on: docker
    container:
      image: catthehacker/ubuntu:act-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak + flatpak-builder + qemu
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder \
            qemu-user-static binfmt-support

      - name: Add flathub remote
        run: |
          flatpak remote-add --if-not-exists --user flathub \
            https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME 50 runtime + SDK (x86_64)
        run: |
          flatpak install --user --noninteractive flathub \
            org.gnome.Platform/x86_64/50 \
            org.gnome.Sdk/x86_64/50

      - name: Build flatpak (x86_64)
        run: |
          flatpak-builder --user --arch=x86_64 --repo=repo --force-clean \
            _flatpak_x86_64 build-aux/flatpak/land.rob.Flow.json

      - name: Bundle (x86_64)
        run: |
          flatpak build-bundle --arch=x86_64 repo \
            flowfree-x86_64.flatpak land.rob.Flow

      - name: Build + bundle (aarch64, via qemu)
        run: |
          if [ ! -e /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            sudo update-binfmts --enable qemu-aarch64 || true
          fi
          if [ ! -e /proc/sys/fs/binfmt_misc/qemu-aarch64 ]; then
            echo "::warning::qemu-aarch64 binfmt unavailable on this runner; skipping aarch64 build. Use ./build-all.sh locally for the aarch64 bundle."
            exit 0
          fi
          flatpak install --user --noninteractive flathub \
            org.gnome.Platform/aarch64/50 \
            org.gnome.Sdk/aarch64/50
          flatpak-builder --user --arch=aarch64 --repo=repo --force-clean \
            _flatpak_aarch64 build-aux/flatpak/land.rob.Flow.json
          flatpak build-bundle --arch=aarch64 repo \
            flowfree-aarch64.flatpak land.rob.Flow

      - name: Upload bundles as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowfree-flatpaks
          path: flowfree-*.flatpak
          retention-days: 30
